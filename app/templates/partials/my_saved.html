<section class="panel">
<form action="{{ url_for('delete_selected_playlists') }}" method="post" data-ajax="true" data-confirm="Delete selected playlists?">
  <div class="p-3 d-flex justify-content-between"><div><h2>Playlists</h2><p class="text-muted">{{ playlists|length }} playlists.</p></div><div><button type="button" class="btn btn-outline-secondary btn-sm" data-select-all="playlist_ids">Select All</button> <button class="btn btn-danger btn-sm">Delete Selected</button></div></div>
  <div class="table-wrap"><table class="table mb-0"><thead><tr><th>Select</th><th>Title</th><th>Description</th><th>Videos</th><th>Actions</th></tr></thead><tbody>{% for playlist in playlists %}<tr><td><input type="checkbox" name="playlist_ids" value="{{ playlist.id }}"></td><td><strong>{{ playlist.title }}</strong><br><small>{{ playlist.id }}</small></td><td>{{ playlist.description|truncate(140) }}</td><td>{{ playlist.video_count }}</td><td><a href="https://www.youtube.com/playlist?list={{ playlist.id }}" target="_blank" class="btn btn-outline-secondary btn-sm">View</a></td></tr>{% endfor %}</tbody></table></div>
  {% if not playlists %}<div class="p-4 text-center text-muted">No playlists found.</div>{% endif %}
</form>
</section>
